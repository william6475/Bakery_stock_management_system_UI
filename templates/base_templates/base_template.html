{% load static %}
<!doctype html>
<html lang="english">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--Bootstrap style sheet-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Custom style sheet-->
    <link rel="stylesheet" href="{% static 'stock_management_ui/styles.css' %}">
    <title>Bakery stock management system</title>
    {% block head %}{% endblock %}
</head>
<body {% block body_attributes %}{% endblock %} class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <a href="/login", class="navbar-brand mb-0 h1 text-decoration-underline">Logout</a>
        {% for link in info.navbar_info %}
            <a href="{{ link.url }}", class="navbar-brand mb-0 h1 text-decoration-underline">{{ link.name }}</a>
        {% endfor %}
    </nav>
    <h1>{% block title %}{% endblock %}</h1>
    {% block body %}{% endblock %}
    {% block js_link %}{% endblock %}
</body>
</html>
