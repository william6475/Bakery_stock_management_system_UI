{% load static %}
<!doctype html>
<html lang="english">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--Bootstrap style sheet-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Custom style sheet-->
    <link rel="stylesheet" href="{% static 'stock_management_ui/styles.css' %}">
    <title>Bakery stock management system</title>
</head>
<body class="bg-light">
    <h1>Log in</h1>
    <!--Display error if invalid credentials entered-->
    {{ info.Invalid_login_error }}
    <!--Form to take login details-->
    <form method="post" action="/login/" name="login_form">
        {% csrf_token %}
        <label>Username</label>
        <br>
        <input type="text" name="username">
        <br>
        <label>Password</label>
        <br>
        <input type="text" name="password">
        <br>
        <input type="submit" name="create_row" value="Login" class="btn btn-primary mt-2 opacity-80">
    </form>
</body>
</html>
